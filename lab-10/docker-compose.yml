services:
  db:
    image: mysql:8.0
    container_name: mysql-lab10
    restart: always
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
      ]
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: lab
    ports:
      - "3316:3306"
    volumes:
      - lab10-data:/var/lib/mysql
      - ../student-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shared

volumes:
  lab10-data:

networks:
  shared:
    external: true
    name: mysql-shared
